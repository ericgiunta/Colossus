name: OS_Checks

on: [workflow_dispatch, push]

permissions:
  contents: read

jobs:
  mac_OMP_check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
          remove-openmp-macos: false
      - name: move to package and install
        run: |
          Rscript -e "install.packages(c('devtools', 'remotes'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: move to package and build examples
        run: |
          brew install pandoc
          Rscript -e "devtools::check(error_on = c('error'), cran=T)"
  mac_no_OMP_check:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
          remove-openmp-macos: false
      - name: move to package and install
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: check detected OS and OpenMP
        run: |
           Rscript -e "a=Colossus::System_Version()
            print(a)
            if (a['OpenMP Enabled']!='FALSE'){
            stop()
            }
            if (a['Operating System']!='osx'){
            stop()
            }
            "
      - name: move to package and test
        run: |
          brew install pandoc
          Rscript -e "devtools::check(error_on = c('error'), cran=T)"
  win_check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
      - name: move to package and check
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: check detected OS and OpenMP
        run: |
           Rscript -e "a=Colossus::System_Version()
            print(a)
            if (a['OpenMP Enabled']!='TRUE'){
            stop()
            }
            "
      - name: move to package and test
        run: |
          choco install pandoc
          refreshenv
          Rscript -e "devtools::check(error_on = c('error'), cran=T)"
  ubuntu_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
      - name: install libraries
        run: |
          sudo apt-get install libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev libfontconfig1-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libuv1-dev
      - name: move to package and check
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: check detected OS and OpenMP
        run: |
           Rscript -e "a=Colossus::System_Version()
            print(a)
            if (a['OpenMP Enabled']!='TRUE'){
            stop()
            }
            if (a['Operating System']!='linux'){
            stop()
            }
            "
      - name: move to package and test
        run: |
          sudo apt-get install pandoc
          sudo apt-get install texlive
          Rscript -e "devtools::check(error_on = c('error'), cran=T)"
  build:
    name: Check Colossus on ${{ matrix.arch }}
    runs-on: ubuntu-24.04${{matrix.arch=='arm64' && '-arm' || ''}}
    strategy:
      fail-fast: false
      matrix:
        arch: [ 'amd64', 'arm64' ]
    container:
      image: ghcr.io/r-devel/rcheckserver/ubuntu:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        Rscript -e "install.packages(c('devtools', 'remotes'))"
        R -q -e 'pak::pkg_install(c("deps::.", "any::rcmdcheck"), dependencies = TRUE)'
        Rscript -e "devtools::install()"
    - uses: r-lib/actions/check-r-package@v2
