name: FUZZ_TEST

on:
  workflow_dispatch:
    branches: [main, dev]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mac_OMP_check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
          remove-openmp-macos: false
      - name: move to package and install
        run: |
          Rscript -e "install.packages(c('devtools', 'remotes', 'fuzzr'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: run tests
        run: |
          Rscript fuzz_testing/fuzz_test.R
  mac_no_OMP_check:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
          remove-openmp-macos: false
      - name: move to package and install
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes', 'fuzzr'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: run tests
        run: |
          Rscript fuzz_testing/fuzz_test.R
  win_check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
      - name: move to package and check
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes', 'fuzzr'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: run tests
        run: |
          Rscript fuzz_testing/fuzz_test.R
  ubuntu_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
      - name: install libraries
        run: |
          sudo apt-get install libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev libfontconfig1-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libuv1-dev
      - name: move to package and check
        run: |
          ls
          Rscript -e "install.packages(c('devtools', 'remotes', 'fuzzr'))"
          Rscript -e "pak::local_install_deps(dependencies = TRUE)"
          Rscript -e "pak::local_install_dev_deps(dependencies = TRUE)"
          Rscript -e "devtools::install()"
      - name: run tests
        run: |
          Rscript fuzz_testing/fuzz_test.R
