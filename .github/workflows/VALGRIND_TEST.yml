name: OS_Checks

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ubuntu_valgrind_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          Ncpus: 2
      - name: Run R CMD check with valgrind
        run: |
          R CMD build .
          R CMD check --use-valgrind --no-vignettes --no-manual *_*.tar.gz
